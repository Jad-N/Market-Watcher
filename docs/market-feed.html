<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Watcher</title>
<style>
  :root {
    --paper:    #f7f8fa;
    --panel:    #ffffff;
    --panel-2:  #f1f3f6;
    --ink:      #0a0c10;
    --ink-2:    #3f4651;
    --ink-3:    #646b76;
    --rule:     #e3e6eb;
    --rule-2:   #eceef2;
    --line:     #e3e6eb;
    --up:       #15803d;
    --up-soft:  rgba(21,128,61,0.10);
    --down:     #dc2626;
    --down-soft:rgba(220,38,38,0.09);
    --amber:    #b45309;
    --amber-soft:rgba(180,83,9,0.11);
    --brand:    #2563ff;
    --brand-soft:rgba(37,99,255,0.11);
    --r:        6px;
    --sans:  'Segoe UI Variable Text', 'Segoe UI Variable', system-ui, -apple-system, 'SF Pro Text', 'Inter', 'Segoe UI', Roboto, Arial, sans-serif;
    --mono:  ui-monospace, 'Cascadia Mono', 'Cascadia Code', 'Segoe UI Mono', 'Consolas', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: var(--sans); color: var(--ink);
    background-color: var(--paper);
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    font-feature-settings: 'tnum' 1;
  }
  .tnum, .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  a { color: inherit; text-decoration: none; }

  /* ---------- masthead ---------- */
  header { position: sticky; top: 0; z-index: 30; background: rgba(247,248,250,0.82); backdrop-filter: saturate(1.1) blur(8px); border-bottom: 1px solid var(--rule); }
  .masthead {
    max-width: 1300px; margin: 0 auto; padding: 16px 28px 13px;
    display: flex; align-items: flex-end; gap: 20px;
    border-bottom: 1px solid var(--rule);
  }
  .mh-left { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; min-width: 0; }
  .wordmark {
    font-family: 'Segoe UI Variable Display', var(--sans); font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
    line-height: 1; color: var(--ink); position: relative; padding-left: 13px;
  }
  .wordmark::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 2px;
    background: var(--brand);
  }
  .kicker { font-size: 10.5px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); }
  .spacer, .mh-spacer { flex: 1; }
  .mh-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
  .pill {
    display: inline-flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 2px; letter-spacing: 0.06em; text-transform: uppercase;
    border: 1px solid transparent;
  }
  .pill.live   { color: var(--up); background: var(--up-soft); border-color: rgba(21,128,61,0.22); }
  .pill.closed { color: var(--ink-3); background: var(--panel-2); border-color: var(--rule); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.live .dot { animation: pulse 1.9s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(21,128,61,0.5); } 60% { box-shadow: 0 0 0 5px rgba(21,128,61,0); } }
  .stamp { font-size: 11.5px; color: var(--ink-2); text-align: right; line-height: 1.35; }
  .stamp b { color: var(--ink); font-weight: 600; }
  .refresh { font-size: 10.5px; color: var(--ink-3); font-family: var(--mono); letter-spacing: 0.01em; }

  /* ---------- ticker tape ---------- */
  .tape {
    max-width: 1300px; margin: 0 auto; display: flex; align-items: stretch;
    overflow-x: auto; scrollbar-width: none;
  }
  .tape::-webkit-scrollbar { display: none; }
  .tape .stat {
    flex: 0 0 auto; padding: 8px 18px; border-right: 1px solid var(--rule-2);
    display: flex; align-items: baseline; gap: 9px; white-space: nowrap;
  }
  .tape .stat:first-child { padding-left: 28px; }
  .tape .stat .sl { font-size: 10.5px; font-weight: 650; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
  .tape .stat .sv { font-family: var(--mono); font-size: 13px; font-weight: 550; color: var(--ink); letter-spacing: -0.01em; }
  .tape .stat .sc { font-family: var(--mono); font-size: 12px; font-weight: 600; }

  /* ---------- layout ---------- */
  main { max-width: 1300px; margin: 0 auto; padding: 22px 28px 64px; }
  .degraded {
    display: none; margin-bottom: 18px; padding: 10px 14px; border-radius: var(--r);
    background: var(--amber-soft); border: 1px solid rgba(151,89,10,0.28); color: var(--amber);
    font-size: 12.5px; font-weight: 500;
  }
  .degraded.show { display: block; }
  .degraded b { font-weight: 700; }

  .topgrid { display: grid; grid-template-columns: 372px 1fr; gap: 18px; margin-bottom: 18px; }

  .panel { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--r); }
  .kick {
    display: flex; align-items: center; gap: 9px; padding: 12px 16px 11px;
    border-bottom: 1px solid var(--rule-2);
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-2);
  }
  .kick .hint { font-family: var(--sans); font-weight: 500; letter-spacing: 0.01em; text-transform: none; color: var(--ink-3); margin-left: auto; font-size: 11px; }
  .kick .hint.mono { font-family: var(--mono); }

  /* ---------- mood ---------- */
  .mood { padding: 14px 16px 18px; display: grid; grid-template-columns: 172px 1fr; gap: 8px; align-items: center; }
  .gauge-wrap { position: relative; width: 172px; height: 110px; }
  .gauge-val { position: absolute; left: 0; right: 0; bottom: 2px; text-align: center; }
  .gauge-val .num { font-family: var(--mono); font-size: 39px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; font-variant-numeric: tabular-nums; }
  .gauge-val .rate { font-size: 10.5px; font-weight: 700; margin-top: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
  .components { display: flex; flex-direction: column; gap: 9px; padding-left: 4px; }
  .comp { display: grid; grid-template-columns: 1fr auto; gap: 5px 8px; align-items: center; }
  .comp .cname { font-size: 11.5px; color: var(--ink-2); }
  .comp .cval { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .comp .bar { grid-column: 1 / -1; height: 3px; border-radius: 0; background: var(--rule-2); overflow: hidden; }
  .comp .bar > span { display: block; height: 100%; }

  /* ---------- regime ---------- */
  .regime { padding: 14px 16px 16px; }
  .regime-top { display: flex; align-items: center; gap: 12px; margin-bottom: 13px; }
  .regime-badge { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 12px; border-radius: 2px; }
  .regime-badge.on  { color: var(--up); background: var(--up-soft); border: 1px solid rgba(21,128,61,0.22); }
  .regime-badge.off { color: var(--down); background: var(--down-soft); border: 1px solid rgba(220,38,38,0.22); }
  .regime-tally { font-family: var(--mono); font-size: 12.5px; color: var(--ink-2); font-weight: 550; }
  .voters { display: grid; grid-template-columns: repeat(auto-fill, minmax(152px, 1fr)); gap: 8px; }
  .voter { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 8px 11px; background: var(--panel-2); border: 1px solid var(--rule-2); border-radius: 2px; }
  .voter .vd { width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .voter .vd.on { background: var(--up); } .voter .vd.off { background: var(--down); }
  .voter .vn { font-weight: 650; text-transform: capitalize; letter-spacing: -0.005em; }
  .voter .vs { color: var(--ink-3); margin-left: auto; font-size: 10.5px; text-align: right; font-family: var(--mono); }

  /* ---------- sentiment signals ---------- */
  .signals { padding: 12px 16px 16px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .sg-group { display: flex; flex-direction: column; gap: 7px; }
  .sg-head { font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-2); }
  .sg-q { font-size: 11.5px; color: var(--ink-3); font-weight: 500; margin: -3px 0 3px; }
  .sig { display: flex; flex-direction: column; gap: 3px; padding: 9px 11px; background: var(--panel-2); border: 1px solid var(--rule-2); border-radius: 4px; }
  .sig .sig-top { display: flex; align-items: center; gap: 7px; }
  .sig .sd { width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .sig .sd.on { background: var(--up); } .sig .sd.off { background: var(--down); } .sig .sd.neutral { background: var(--ink-3); }
  .sig .sl2 { font-size: 11.5px; font-weight: 650; letter-spacing: -0.005em; }
  .sig .sv2 { font-size: 12px; font-weight: 650; padding-left: 13px; line-height: 1.3; }
  .sig .sx { font-size: 10.5px; color: var(--ink-3); padding-left: 13px; line-height: 1.35; }

  /* ---------- two-col ---------- */
  .cols { display: grid; grid-template-columns: 1fr 418px; gap: 18px; align-items: start; }
  .side { display: flex; flex-direction: column; gap: 18px; }

  /* ---------- event tape ---------- */
  .filterbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--rule-2); align-items: center; }
  .filterbar.sub { padding-top: 0; border-top: none; }
  .search { flex: 1; min-width: 160px; border: 1px solid var(--rule); border-radius: 2px; padding: 7px 11px; font: inherit; font-size: 13px; color: var(--ink); background: var(--paper); }
  .search::placeholder { color: var(--ink-3); }
  .search:focus { outline: none; border-color: var(--brand); background: #fff; box-shadow: 0 0 0 3px var(--brand-soft); }
  .seclabel { font-size: 10px; color: var(--ink-3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 2px; border: 1px solid var(--rule); background: var(--panel); color: var(--ink-2); cursor: pointer; user-select: none; transition: background .12s, color .12s, border-color .12s; letter-spacing: 0.01em; }
  .chip:hover { border-color: var(--ink-3); color: var(--ink); }
  .chip.on { background: var(--brand); color: #fff; border-color: var(--brand); }
  .feed { max-height: 1240px; overflow-y: auto; }
  .ev { display: grid; grid-template-columns: 62px 1fr; gap: 13px; padding: 12px 16px; border-bottom: 1px solid var(--rule-2); position: relative; }
  .ev:last-child { border-bottom: none; }
  .ev::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: transparent; }
  .ev:hover { background: var(--panel-2); }
  .ev:hover::before { background: var(--rule); }
  .ev .when { font-family: var(--mono); font-size: 11px; color: var(--ink-3); padding-top: 2px; line-height: 1.35; }
  .ev .when .d { display: block; font-size: 10px; color: var(--ink-3); opacity: .75; margin-top: 1px; }
  .ev .body { min-width: 0; }
  .ev .row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .tag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; }
  .tag.post   { color: var(--brand); background: var(--brand-soft); }
  .tag.news   { color: var(--ink-2); background: var(--panel-2); border: 1px solid var(--rule-2); }
  .tag.filing { color: var(--amber); background: var(--amber-soft); }
  .tag.move   { color: var(--ink); background: var(--rule-2); }
  .tag.theme  { color: #0e7490; background: rgba(14,116,144,0.10); }
  .tag.gauge  { color: #be123c; background: rgba(190,18,60,0.09); }
  .sym { font-family: var(--mono); font-size: 12px; font-weight: 650; letter-spacing: 0; }
  .sym .at { color: var(--ink-3); font-weight: 500; }
  .ev .txt { font-size: 13px; color: var(--ink); line-height: 1.45; }
  .ev .txt a:hover { color: var(--brand); text-decoration: underline; text-underline-offset: 2px; text-decoration-color: rgba(37,99,255,0.4); }
  .empty { padding: 40px 16px; text-align: center; color: var(--ink-3); font-size: 13px; }

  /* ---------- charts ---------- */
  .chart { padding: 12px 14px 16px; }
  .chart svg { width: 100%; height: auto; display: block; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 10px 16px 0; font-size: 11px; color: var(--ink-2); }
  .legend i { display: inline-block; width: 15px; height: 2.5px; vertical-align: middle; margin-right: 6px; }

  /* ---------- watchlist ---------- */
  .names { padding: 4px 6px 10px; }
  .names-sec { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); padding: 12px 11px 6px; border-bottom: 1px solid var(--rule-2); margin: 0 4px 4px; }
  .name { display: grid; grid-template-columns: 1fr auto; gap: 2px 8px; padding: 8px 11px; border-radius: 2px; }
  .name:hover { background: var(--panel-2); }
  .name .nt { font-family: var(--mono); font-size: 13px; font-weight: 650; letter-spacing: 0; }
  .name .np { font-family: var(--mono); font-size: 13px; font-weight: 600; text-align: right; }
  .name .meta { grid-column: 1 / -1; font-size: 11px; color: var(--ink-3); display: flex; gap: 9px; flex-wrap: wrap; margin-top: 2px; }
  .name .meta .hot { color: var(--amber); font-weight: 650; }
  .up { color: var(--up); } .down { color: var(--down); } .flat { color: var(--ink-3); }

  .foot { text-align: center; color: var(--ink-3); font-size: 11px; margin-top: 30px; line-height: 1.8; letter-spacing: 0.01em; }

  /* ---------- load reveal ---------- */
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .reveal { animation: rise .5s cubic-bezier(.2,.7,.3,1) both; }
  .reveal.d1 { animation-delay: .04s; } .reveal.d2 { animation-delay: .10s; }
  .reveal.d3 { animation-delay: .16s; } .reveal.d4 { animation-delay: .22s; }
  @media (prefers-reduced-motion: reduce) { .reveal { animation: none; } .pill.live .dot { animation: none; } }

  @media (max-width: 1080px) {
    .topgrid { grid-template-columns: 1fr; }
    .cols { grid-template-columns: 1fr; }
    .signals { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    .masthead, .tape, main { padding-left: 16px; padding-right: 16px; }
    .tape .stat:first-child { padding-left: 16px; }
    .mood { grid-template-columns: 1fr; justify-items: center; }
    .components { width: 100%; }
  }
</style>
</head>
<body>
<header>
  <div class="masthead">
    <div class="mh-left">
      <div class="wordmark">Market Watcher</div>
      <div class="kicker">Live market desk</div>
    </div>
    <div class="mh-right">
      <span id="livepill" class="pill closed"><span class="dot"></span><span id="liveword">—</span></span>
      <div class="stamp"><b id="genat">loading…</b><div class="refresh" id="refresh"></div></div>
    </div>
  </div>
  <div class="tape" id="strip"></div>
</header>
<main>
  <div class="degraded" id="degraded"></div>

  <div class="topgrid">
    <section class="panel reveal d1">
      <div class="kick">Market Mood<span class="hint">unweighted mean</span></div>
      <div class="mood">
        <div class="gauge-wrap">
          <svg viewBox="0 0 172 110" id="gauge"></svg>
          <div class="gauge-val"><div class="num" id="moodnum">—</div><div class="rate" id="moodrate"></div></div>
        </div>
        <div class="components" id="components"></div>
      </div>
    </section>
    <section class="panel reveal d2">
      <div class="kick">Macro Regime<span class="hint" id="regimehint"></span></div>
      <div class="regime">
        <div class="regime-top">
          <span class="regime-badge" id="regimebadge">—</span>
          <span class="regime-tally" id="regimetally"></span>
        </div>
        <div class="voters" id="voters"></div>
      </div>
    </section>
  </div>

  <section class="panel reveal d2" id="signalspanel" style="margin-bottom:18px">
    <div class="kick">Sentiment Signals<span class="hint" id="signalshint"></span></div>
    <div class="signals" id="signals"></div>
  </section>

  <div class="cols">
    <section class="panel reveal d3">
      <div class="kick">Live Tape<span class="hint mono" id="evcount"></span></div>
      <div class="filterbar">
        <input class="search" id="search" placeholder="Search events, symbols, headlines…">
        <div class="chips" id="typechips"></div>
      </div>
      <div class="filterbar sub">
        <span class="seclabel">Section</span>
        <div class="chips" id="sectionchips"></div>
      </div>
      <div class="feed" id="feed"></div>
    </section>

    <div class="side">
      <section class="panel reveal d3">
        <div class="kick">Sentiment Timeline<span class="hint mono" id="timehint"></span></div>
        <div class="legend" id="legend"></div>
        <div class="chart"><svg viewBox="0 0 380 150" id="timechart" preserveAspectRatio="none"></svg></div>
      </section>
      <section class="panel reveal d4">
        <div class="kick">Watchlist<span class="hint">% vs prior close</span></div>
        <div class="names" id="names"></div>
      </section>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</main>

<script>
const TYPES = [
  { k: 'post', label: 'Posts' }, { k: 'news', label: 'News' }, { k: 'filing', label: 'Filings' },
  { k: 'move', label: 'Moves' }, { k: 'theme', label: 'Themes' }, { k: 'gauge', label: 'Gauges' },
];
const SECTIONS = [ { k: 'trading', label: 'Trading' }, { k: 'macro', label: 'Macro' }, { k: 'crypto', label: 'Crypto' }, { k: 'theme', label: 'Theme' } ];
const state = { data: null, q: '', types: new Set(), sections: new Set() };
const $ = (id) => document.getElementById(id);
const esc = (s) => (s == null ? '' : String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])));
const fmt1 = (n) => (n == null ? '—' : (Math.round(n * 10) / 10).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 }));
const pctClass = (n) => (n == null ? 'flat' : n > 0 ? 'up' : n < 0 ? 'down' : 'flat');
const pctStr = (n) => (n == null ? '—' : (n > 0 ? '+' : '') + fmt1(n) + '%');

// red → amber → green ramp for a 0-100 mood value
function moodColor(v) {
  if (v == null) return '#9aa0a8';
  if (v < 25) return '#dc2626';
  if (v < 45) return '#ea580c';
  if (v < 60) return '#ca8a04';
  if (v < 75) return '#65a30d';
  return '#15803d';
}

function drawGauge(v) {
  const cx = 86, cy = 94, r = 71, sw = 12;
  const ang = (t) => Math.PI - t * Math.PI; // t 0..1 over the top semicircle
  const pt = (t, rr) => [cx + rr * Math.cos(ang(t)), cy - rr * Math.sin(ang(t))];
  const arc = (t0, t1, rr) => { const [x0, y0] = pt(t0, rr), [x1, y1] = pt(t1, rr); const large = (t1 - t0) > 0.5 ? 1 : 0; return `M ${x0.toFixed(1)} ${y0.toFixed(1)} A ${rr} ${rr} 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)}`; };
  let s = `<path d="${arc(0, 1, r)}" fill="none" stroke="#e3e6eb" stroke-width="${sw}" stroke-linecap="round"/>`;
  if (v != null) {
    const t = Math.max(0, Math.min(1, v / 100));
    const col = moodColor(v);
    s += `<path d="${arc(0, t, r)}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>`;
    const [mx, my] = pt(t, r);
    s += `<circle cx="${mx.toFixed(1)}" cy="${my.toFixed(1)}" r="6" fill="#ffffff" stroke="${col}" stroke-width="3"/>`;
  }
  // tick labels 0 / 100
  const tk = (t, lab) => { const [x, y] = pt(t, r - sw - 9); return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-size="8.5" font-family="ui-monospace, Consolas, monospace" fill="#9aa0a8" text-anchor="middle" dominant-baseline="middle">${lab}</text>`; };
  s += tk(0, '0') + tk(1, '100');
  $('gauge').innerHTML = s;
}

function renderMood(d) {
  const m = d.mood || {};
  $('moodnum').textContent = m.composite == null ? '—' : fmt1(m.composite);
  $('moodnum').style.color = moodColor(m.composite);
  $('moodrate').textContent = m.rating || '';
  $('moodrate').style.color = moodColor(m.composite);
  drawGauge(m.composite);
  $('components').innerHTML = (m.components || []).map((c) => {
    const col = moodColor(c.value);
    return `<div class="comp"><span class="cname">${esc(c.name)}</span><span class="cval" style="color:${col}">${fmt1(c.value)}</span><span class="bar"><span style="width:${Math.max(0, Math.min(100, c.value))}%;background:${col}"></span></span></div>`;
  }).join('') || '<div class="cname" style="color:var(--ink-3)">no components this run</div>';
}

function renderRegime(d) {
  const r = d.regime;
  if (!r) { $('regimebadge').textContent = 'unavailable'; return; }
  const on = r.label && r.label.indexOf('on') >= 0;
  const b = $('regimebadge'); b.textContent = r.label; b.className = 'regime-badge ' + (on ? 'on' : 'off');
  $('regimetally').textContent = `${r.tally} voters · ${fmt1(r.score)}% risk-on`;
  $('regimehint').textContent = (r.drivers || []).slice(0, 2).join(' · ');
  $('voters').innerHTML = (r.components || []).map((c) => {
    const von = c.vote === 'on';
    return `<div class="voter" title="${esc(c.detail)}"><span class="vd ${von ? 'on' : 'off'}"></span><span class="vn">${esc(c.name)}</span><span class="vs">${esc(c.state)}</span></div>`;
  }).join('');
}

function leanColor(lean) { return lean === 'risk-on' ? 'var(--up)' : lean === 'risk-off' ? 'var(--down)' : 'var(--ink-3)'; }
function leanDot(lean) { return lean === 'risk-on' ? 'on' : lean === 'risk-off' ? 'off' : 'neutral'; }
function renderSignals(d) {
  const ms = d.moodSignals;
  const panel = $('signalspanel');
  if (!ms || !ms.groups || !ms.groups.length) { if (panel) panel.style.display = 'none'; return; }
  if (panel) panel.style.display = '';
  $('signalshint').textContent = ms.asOfET ? 'daily · as of ' + ms.asOfET : 'daily';
  $('signals').innerHTML = ms.groups.map((g) => {
    const cards = (g.signals || []).map((s) => {
      const col = leanColor(s.lean);
      const detail = s.detail ? `<div class="sx">${esc(s.detail)}</div>` : '';
      const val = s.status === 'ok' ? esc(s.state) : 'unavailable';
      return `<div class="sig"><div class="sig-top"><span class="sd ${leanDot(s.lean)}"></span><span class="sl2">${esc(s.label)}</span></div>`
        + `<div class="sv2" style="color:${col}">${val}</div>${detail}</div>`;
    }).join('');
    return `<div class="sg-group"><div class="sg-head">${esc(g.title)}</div><div class="sg-q">${esc(g.question)}</div>${cards}</div>`;
  }).join('');
}

function renderStrip(d) {
  const ms = (d.snapshot && d.snapshot.marketState) || {};
  const items = [];
  for (const f of ms.futures || []) {
    const up = f.invert ? f.change < 0 : f.change > 0;
    items.push(`<div class="stat"><span class="sl">${esc(f.name)}</span><span class="sv">${f.value.toLocaleString('en-US')}</span><span class="sc ${up ? 'up' : 'down'}">${pctStr(f.change)}</span></div>`);
  }
  for (const b of ms.benchmarks || []) {
    items.push(`<div class="stat"><span class="sl">${esc(b.ticker)}</span><span class="sc ${pctClass(b.pct)}">${pctStr(b.pct)}</span></div>`);
  }
  $('strip').innerHTML = items.join('');
}

function eventMatches(e) {
  if (state.types.size && !state.types.has(e.type)) return false;
  if (state.sections.size && !state.sections.has(e.section)) return false;
  if (state.q) {
    const hay = `${e.symbol || ''} ${e.theme || ''} ${e.text || ''} ${e.type} ${e.handle || ''}`.toLowerCase();
    if (!hay.includes(state.q)) return false;
  }
  return true;
}

function dayLabel(ms) {
  return new Date(ms).toLocaleDateString('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric' });
}

function renderFeed() {
  const evs = (state.data.events || []).filter(eventMatches);
  $('evcount').textContent = `${evs.length} event${evs.length === 1 ? '' : 's'}`;
  if (!evs.length) { $('feed').innerHTML = '<div class="empty">No events match. Clear a filter, or the watch primed quietly.</div>'; return; }
  $('feed').innerHTML = evs.map((e) => {
    const head = e.type === 'theme' ? esc(e.theme) : (e.symbol ? esc(e.symbol) : '');
    const at = e.handle ? ` <span class="at">${esc(e.handle)}</span>` : '';
    let txt = esc(e.text);
    if (e.url) txt = `<a href="${esc(e.url)}" target="_blank" rel="noopener">${txt} ↗</a>`;
    const tagLabel = e.type === 'filing' && e.filingType ? esc(e.filingType) : e.type;
    return `<div class="ev"><div class="when">${esc(e.timeLabel)}<span class="d">${dayLabel(e.time)}</span></div>`
      + `<div class="body"><div class="row1"><span class="tag ${e.type}">${tagLabel}</span>${head ? `<span class="sym">${head}${at}</span>` : ''}</div>`
      + `<div class="txt">${txt}</div></div></div>`;
  }).join('');
}

// ---- timeline chart (inline SVG, multi-series) ----
function renderTimeline(d) {
  const tl = (d.timeline || []).filter((p) => p.t);
  const svg = $('timechart');
  if (tl.length < 2) { svg.innerHTML = '<text x="190" y="75" font-size="11" fill="#9aa0a8" text-anchor="middle">timeline builds as runs accumulate</text>'; $('legend').innerHTML = ''; return; }
  const W = 380, H = 150, PL = 20, PR = 6, PT = 10, PB = 16;
  const xs = tl.map((p) => p.t); const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const X = (t) => PL + (x1 === x0 ? 0 : (t - x0) / (x1 - x0)) * (W - PL - PR);
  const series = [
    { key: 'composite', col: '#0a0c10', w: 2.2, label: 'Composite mood' },
    { key: 'cnn', col: '#2563ff', w: 1.4, label: 'CNN Fear & Greed' },
    { key: 'regime', col: '#15803d', w: 1.4, label: 'Regime risk-on %' },
  ];
  const vals = [];
  for (const s of series) for (const p of tl) if (p[s.key] != null) vals.push(p[s.key]);
  let lo = Math.min(...vals), hi = Math.max(...vals);
  const pad = Math.max(4, (hi - lo) * 0.18); lo = Math.max(0, Math.floor((lo - pad) / 5) * 5); hi = Math.min(100, Math.ceil((hi + pad) / 5) * 5);
  const Y = (v) => PT + (1 - (v - lo) / (hi - lo || 1)) * (H - PT - PB);
  let g = '';
  const ticks = [];
  for (let t = Math.ceil(lo / 20) * 20; t <= hi; t += 20) ticks.push(t);
  for (const gl of ticks) { g += `<line x1="${PL}" y1="${Y(gl).toFixed(1)}" x2="${W - PR}" y2="${Y(gl).toFixed(1)}" stroke="#eceef2" stroke-width="1"/><text x="2" y="${(Y(gl) + 3).toFixed(1)}" font-size="8" font-family="ui-monospace, Consolas, monospace" fill="#9aa0a8">${gl}</text>`; }
  if (lo <= 50 && hi >= 50) g += `<line x1="${PL}" y1="${Y(50).toFixed(1)}" x2="${W - PR}" y2="${Y(50).toFixed(1)}" stroke="#cbd0d8" stroke-width="1" stroke-dasharray="3 3"/><text x="${W - PR}" y="${(Y(50) - 3).toFixed(1)}" font-size="7.5" fill="#646b76" text-anchor="end">neutral 50</text>`;
  for (const s of series) {
    const pts = tl.filter((p) => p[s.key] != null);
    if (pts.length < 2) continue;
    if (s.key === 'composite') {
      const area = `M ${X(pts[0].t).toFixed(1)} ${Y(pts[0][s.key]).toFixed(1)} ` + pts.map((p) => `L ${X(p.t).toFixed(1)} ${Y(p[s.key]).toFixed(1)}`).join(' ') + ` L ${X(pts[pts.length - 1].t).toFixed(1)} ${H - PB} L ${X(pts[0].t).toFixed(1)} ${H - PB} Z`;
      g += `<path d="${area}" fill="rgba(10,12,16,0.045)"/>`;
    }
    const dpath = 'M ' + pts.map((p) => `${X(p.t).toFixed(1)} ${Y(p[s.key]).toFixed(1)}`).join(' L ');
    g += `<path d="${dpath}" fill="none" stroke="${s.col}" stroke-width="${s.w}" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>`;
    const last = pts[pts.length - 1];
    g += `<circle cx="${X(last.t).toFixed(1)}" cy="${Y(last[s.key]).toFixed(1)}" r="2.6" fill="${s.col}"/>`;
  }
  // x date ticks (first / mid / last)
  const tick = (t) => `<text x="${X(t).toFixed(1)}" y="${H - 3}" font-size="8.5" font-family="ui-monospace, Consolas, monospace" fill="#646b76" text-anchor="middle">${dayLabel(t)}</text>`;
  g += tick(x0) + tick(tl[Math.floor(tl.length / 2)].t) + tick(x1);
  svg.innerHTML = g;
  $('legend').innerHTML = series.map((s) => `<span><i style="background:${s.col}"></i>${s.label}</span>`).join('');
  $('timehint').textContent = `${tl.length} pts · ${dayLabel(x0)} to ${dayLabel(x1)}`;
}

function renderNames(d) {
  const order = { trading: 0, macro: 1, crypto: 2 };
  const groups = {};
  for (const n of d.perName || []) { const s = n.section || 'macro'; (groups[s] = groups[s] || []).push(n); }
  const secLabel = { trading: 'Trading basket', macro: 'Macro context', crypto: 'Crypto' };
  let html = '';
  for (const sec of Object.keys(groups).sort((a, b) => (order[a] ?? 9) - (order[b] ?? 9))) {
    html += `<div class="names-sec">${secLabel[sec] || sec}</div>`;
    for (const n of groups[sec]) {
      const meta = [];
      if (n.newsCount) meta.push(`${n.newsCount} headline${n.newsCount === 1 ? '' : 's'}`);
      if (n.latestFiling) meta.push(`<span class="hot">filing: ${esc(n.latestFiling.type)}</span>`);
      if (n.latestPost) meta.push('posted');
      if (n.stocktwits) meta.push(`ST ${fmt1(n.stocktwits.bullPct)}% bull`);
      html += `<div class="name"><span class="nt">${esc(n.ticker)}</span><span class="np ${pctClass(n.pct)}">${pctStr(n.pct)}</span>`
        + (meta.length ? `<span class="meta">${meta.join('<span style="color:var(--rule)">·</span>')}</span>` : '') + `</div>`;
    }
  }
  $('names').innerHTML = html;
}

function renderHeader(d) {
  const open = d.marketOpen;
  const p = $('livepill');
  if (open) { p.className = 'pill live'; $('liveword').textContent = 'Live'; }
  else { p.className = 'pill closed'; $('liveword').textContent = 'Market closed'; }
  $('genat').textContent = (open ? 'Updated ' : 'Last updated ') + (d.generatedAt || '');
}

function renderDegraded(d) {
  const box = $('degraded');
  if (d.degraded && d.degraded.length) { box.className = 'degraded show'; box.innerHTML = `<b>Feeds degraded this run:</b> ${d.degraded.map(esc).join(' · ')}`; }
  else box.className = 'degraded';
}

function renderChips() {
  $('typechips').innerHTML = TYPES.map((t) => `<span class="chip ${state.types.has(t.k) ? 'on' : ''}" data-type="${t.k}">${t.label}</span>`).join('');
  $('sectionchips').innerHTML = SECTIONS.map((s) => `<span class="chip ${state.sections.has(s.k) ? 'on' : ''}" data-sec="${s.k}">${s.label}</span>`).join('');
}

function render() {
  const d = state.data; if (!d) return;
  renderHeader(d); renderDegraded(d); renderMood(d); renderRegime(d); renderSignals(d);
  renderStrip(d); renderChips(); renderFeed(); renderTimeline(d); renderNames(d);
  $('foot').innerHTML = `Deterministic feed. No AI in the cron path. ${esc(d.generatedAt || '')}<br>Mood is the unweighted mean of present gauges. Prices, news, gauges, and filings from free public feeds.`;
}

// filter interactions
document.addEventListener('click', (e) => {
  const c = e.target.closest('.chip'); if (!c) return;
  if (c.dataset.type) { state.types.has(c.dataset.type) ? state.types.delete(c.dataset.type) : state.types.add(c.dataset.type); }
  if (c.dataset.sec) { state.sections.has(c.dataset.sec) ? state.sections.delete(c.dataset.sec) : state.sections.add(c.dataset.sec); }
  renderChips(); renderFeed();
});
$('search').addEventListener('input', (e) => { state.q = e.target.value.trim().toLowerCase(); renderFeed(); });

let countdown = 60;
async function load() {
  try {
    const r = await fetch('feed-data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    state.data = await r.json();
    render();
  } catch (err) {
    $('genat').textContent = 'feed unreachable, retrying';
  }
  countdown = 60;
}
setInterval(() => { countdown--; if (countdown <= 0) load(); $('refresh').textContent = 'refresh in ' + Math.max(0, countdown) + 's'; }, 1000);
load();
</script>
</body>
</html>
